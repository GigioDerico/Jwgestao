<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Congregação Vicente Nunes</title>
  <desc id="desc">Logo da congregação em escudo azul com o texto Congregação Vicente Nunes.</desc>
  <defs>
    <linearGradient id="shield" x1="8%" x2="88%" y1="2%" y2="100%">
      <stop offset="0%" stop-color="#5f94ff" />
      <stop offset="45%" stop-color="#2d63d5" />
      <stop offset="100%" stop-color="#193d9e" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0d245e" flood-opacity="0.28" />
    </filter>
  </defs>
  <g filter="url(#shadow)">
